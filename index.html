<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karabo Moeng | Neon World Map</title>

<!-- Leaflet (FREE map library) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 10px;
    background: #0a0a0a;
    box-shadow: 0 0 15px cyan;
}

/* Map */
#map {
    height: 90vh;
    box-shadow: 0 0 25px cyan;
}

/* Footer */
.footer {
    text-align: center;
    padding: 5px;
    font-size: 12px;
    color: gray;
}

/* Neon marker glow */
.leaflet-marker-icon {
    filter: drop-shadow(0 0 10px cyan);
}
</style>
</head>

<body>

<div class="header">
    🌍 Neon World Map — Karabo Moeng
</div>

<div id="map"></div>

<div class="footer">
    Created by Karabo Moeng
</div>

<script>

// Create map centered on the world first
const map = L.map('map').setView([0, 20], 2);

// FREE dark map (NO API KEY)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© Karabo Moeng',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// Try get user location
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(position => {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        map.setView([lat, lon], 13);

        L.marker([lat, lon]).addTo(map)
            .bindPopup("📍 You are here<br>Karabo Moeng")
            .openPopup();

    }, () => {
        alert("Location access denied — showing world view");
    });
}

console.log("Neon World Map by Karabo Moeng");

</script>

</body>
</html>
